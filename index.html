<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DoubtSolver — Ask Anything, Learn Everything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="app">

  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">D</div>
        <div>
          <div class="logo-name">DoubtSolver</div>
          <div class="logo-sub">AI Tutor</div>
        </div>
      </div>
    </div>

    <div class="subject-section">
      <div class="section-label">Subject Mode</div>
      <div class="subject-list" id="subject-list">
        <button class="subj-btn active" data-subject="auto">
          <span class="subj-icon">⚡</span>
          <span>Auto-detect</span>
        </button>
        <button class="subj-btn" data-subject="Mathematics">
          <span class="subj-icon">∑</span>
          <span>Mathematics</span>
        </button>
        <button class="subj-btn" data-subject="Physics">
          <span class="subj-icon">⚛</span>
          <span>Physics</span>
        </button>
        <button class="subj-btn" data-subject="Chemistry">
          <span class="subj-icon">⚗</span>
          <span>Chemistry</span>
        </button>
        <button class="subj-btn" data-subject="Biology">
          <span class="subj-icon">🧬</span>
          <span>Biology</span>
        </button>
        <button class="subj-btn" data-subject="History">
          <span class="subj-icon">📜</span>
          <span>History</span>
        </button>
        <button class="subj-btn" data-subject="Computer Science">
          <span class="subj-icon">{}</span>
          <span>Comp. Science</span>
        </button>
        <button class="subj-btn" data-subject="English">
          <span class="subj-icon">✍</span>
          <span>English</span>
        </button>
        <button class="subj-btn" data-subject="Economics">
          <span class="subj-icon">📈</span>
          <span>Economics</span>
        </button>
      </div>
    </div>

    <div class="sidebar-stats">
      <div class="stat-item">
        <div class="stat-number" id="stat-count">0</div>
        <div class="stat-label">Doubts Solved</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="stat-subject">—</div>
        <div class="stat-label">Current Subject</div>
      </div>
    </div>

    <button class="new-chat-btn" id="new-chat-btn">
      + New Session
    </button>
  </aside>

  <!-- ── Main content ── -->
  <main id="main">

    <!-- Topbar -->
    <header id="topbar">
      <button id="menu-toggle">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">
        <span id="topbar-subject">Ask Your Doubt</span>
        <span class="topbar-pill" id="status-pill">● Live</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="clear-btn" title="Clear chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </header>

    <!-- Chat window -->
    <div id="chat-window">
      <div id="chat-messages">

        <!-- Welcome state -->
        <div class="welcome-block" id="welcome-block">
          <div class="welcome-glyph">?</div>
          <h1 class="welcome-title">What's your doubt?</h1>
          <p class="welcome-sub">Ask any academic question — Maths, Science, History, Coding and more.<br>Get a clear, step-by-step explanation instantly.</p>

          <div class="sample-doubts" id="sample-doubts">
            <button class="sample-btn" data-q="Explain Newton's third law of motion with an example">⚛ Newton's Third Law</button>
            <button class="sample-btn" data-q="How do I solve quadratic equations? Show me step by step">∑ Quadratic Equations</button>
            <button class="sample-btn" data-q="What caused World War 1? Explain briefly">📜 Causes of WW1</button>
            <button class="sample-btn" data-q="What is photosynthesis and how does it work?">🧬 Photosynthesis</button>
            <button class="sample-btn" data-q="Explain the difference between stack and queue in data structures">{ } Stack vs Queue</button>
            <button class="sample-btn" data-q="What is the difference between acids and bases in chemistry?">⚗ Acids vs Bases</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Input area -->
    <div id="input-zone">
      <div class="subject-badge" id="active-subject-badge">⚡ Auto</div>
      <div id="input-container">
        <textarea
          id="doubt-input"
          placeholder="Type your doubt here… e.g. 'How does photosynthesis work?' or 'Solve x² + 5x + 6 = 0'"
          rows="1"
        ></textarea>
        <button id="ask-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span>Press <kbd>Enter</kbd> to ask · <kbd>Shift+Enter</kbd> for new line</span>
        <span id="char-count">0 / 1000</span>
      </div>
    </div>

  </main>
</div>

<div id="sidebar-overlay" class="overlay"></div>

<script src="app.js"></script>
</body>
</html>
